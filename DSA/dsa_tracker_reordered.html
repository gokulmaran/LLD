<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Problem Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
    --text:#1a1a1a;--text2:#555551;--text3:#888780;
    --border:#e5e4df;--border2:#d0cfc9;
    --green-bg:#EAF3DE;--green-text:#27500A;--green-border:#97C459;
    --amber:#BA7517;--red:#A32D2D;--easy:#27500A;
    --lc-bg:#FFF3E0;--lc-text:#FFA116;--lc-border:#FFA11640;
    --gfg-bg:#E8F5E9;--gfg-text:#2F8D46;--gfg-border:#2F8D4640;
    --accent:#534AB7;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1917;--bg2:#232220;--bg3:#2a2927;
      --text:#e8e6df;--text2:#aaa89f;--text3:#6b6960;
      --border:#333230;--border2:#3d3c39;
      --green-bg:#1a2e10;--green-text:#9FE1CB;--green-border:#3B6D1180;
      --amber:#EF9F27;--red:#F09595;--easy:#9FE1CB;
      --lc-bg:#2a1f00;--lc-text:#FFA116;--lc-border:#FFA11640;
      --gfg-bg:#0d1f10;--gfg-text:#5DCAA5;--gfg-border:#2F8D4640;
      --accent:#7F77DD;
    }
  }
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  .layout{display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden}
  /* SIDEBAR */
  .sb{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
  .sb::-webkit-scrollbar{width:4px}.sb::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .sb-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);margin-bottom:4px}
  .sb-header h2{font-size:15px;font-weight:600;color:var(--text)}
  .sb-header p{font-size:11px;color:var(--text3);margin-top:2px}
  .sec-block{margin-bottom:2px}
  .sec-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px}
  .sec-name{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
  .sec-stat{font-size:11px;color:var(--text3)}
  .topic-row{display:flex;align-items:center;padding:5px 14px 5px 20px;cursor:pointer;border-left:3px solid transparent;transition:background .1s}
  .topic-row:hover{background:var(--bg)}
  .topic-row.active{background:var(--bg);border-left-color:var(--accent)}
  .topic-row.active .topic-name{color:var(--text);font-weight:500}
  .topic-hash{font-size:11px;color:var(--text3);margin-right:7px;width:10px;flex-shrink:0}
  .topic-name{flex:1;font-size:13px;color:var(--text2)}
  .topic-prog{font-size:11px;padding:1px 7px;border-radius:20px;margin-right:6px;font-weight:500;white-space:nowrap}
  .topic-prog.full{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
  .topic-prog.part{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
  .topic-prog.none{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
  .topic-total{font-size:11px;color:var(--text3);min-width:18px;text-align:right}
  /* MAIN */
  .main{background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
  .main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .m-top{padding:16px 22px 12px;flex-shrink:0}
  .m-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:3px}
  .m-sub{font-size:13px;color:var(--text3)}
  .filter-row{display:flex;gap:8px;padding:8px 22px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .fb{font-size:12px;padding:4px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s}
  .fb:hover{background:var(--bg2)}
  .fb.act{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);font-weight:500}
  /* TABLE */
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;font-weight:500;color:var(--text3);text-align:left;padding:9px 22px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;background:var(--bg);position:sticky;top:0;z-index:1}
  .pr{transition:background .1s;cursor:pointer}
  .pr:hover{background:var(--bg2)}
  .pr.slv .pname{text-decoration:line-through;color:var(--text3)}
  td{padding:10px 22px;vertical-align:middle;border-bottom:1px solid var(--border)}
  /* Checkbox */
  .cb{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;background:var(--bg);flex-shrink:0;user-select:none}
  .cb:hover{border-color:var(--green-text)}
  .cb.dn{background:var(--green-text);border-color:var(--green-text)}
  .cb svg{opacity:0;transform:scale(.3);transition:all .18s}
  .cb.dn svg{opacity:1;transform:scale(1)}
  /* Problem */
  .prob-num{font-size:13px;color:var(--text3);margin-right:4px}
  .pname{font-size:13px;color:var(--text)}
  .link-pill{font-size:11px;padding:1px 7px;border-radius:5px;text-decoration:none;margin-left:8px;border:1px solid;white-space:nowrap}
  .link-pill:hover{opacity:.75}
  .link-lc{color:var(--lc-text);background:var(--lc-bg);border-color:var(--lc-border)}
  .link-gfg{color:var(--gfg-text);background:var(--gfg-bg);border-color:var(--gfg-border)}
  .sbadge{font-size:10px;padding:1px 7px;border-radius:5px;background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border);margin-left:6px}
  /* Difficulty */
  .de{font-size:12px;color:var(--easy)}
  .dm{font-size:12px;color:var(--amber)}
  .dh{font-size:12px;color:var(--red)}
  .pat{font-size:12px;color:var(--text2)}
  /* Action */
  .drb{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
  .drb:hover{background:var(--bg2)}
  /* Empty */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--text3);padding:60px}
  /* Toast */
  #toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;font-size:12px;padding:8px 14px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.15)}
  #toast.show{opacity:1}
  /* Overall progress bar at top of sidebar */
  .overall-bar{padding:10px 16px;border-bottom:1px solid var(--border)}
  .overall-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
  .bar-track{height:4px;background:var(--bg3);border-radius:2px}
  .bar-fill{height:4px;border-radius:2px;background:var(--accent);transition:width .4s}
</style>
</head>
<body>
<div class="layout">
  <div class="sb" id="sb">
    <div class="sb-header">
      <h2>DSA Tracker</h2>
      <p id="overall-text">Loading...</p>
    </div>
    <div class="overall-bar">
      <div class="overall-label"><span>Overall Progress</span><span id="overall-pct">0%</span></div>
      <div class="bar-track"><div class="bar-fill" id="overall-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="empty">
      <div style="font-size:32px">📚</div>
      <span style="font-size:16px;font-weight:500;color:var(--text2)">Select a topic</span>

    </div>
  </div>
</div>
<div id="toast"></div>

// Load saved state from localStorage
const SAVE_KEY = 'dsa_tracker_v1';
let DS = {};
try {
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) DS = JSON.parse(saved);
} catch(e) {}
// Initialize any missing keys from data defaults
D.forEach(s=>s.items.forEach(t=>t.p.forEach(p=>{
  const k = t.id+'§'+p.t;
  if (!(k in DS)) DS[k] = p.done;
})));

function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(DS)); } catch(e){}
}

let aT=null, aF='all';
function gD(t){return t.p.filter(p=>DS[t.id+'§'+p.t]).length;}
function gP(t){return t.p.length>0?Math.round(gD(t)/t.p.length*100):0;}

function showToast(m){
  const e=document.getElementById('toast');
  e.textContent=m; e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),1800);
}

function updateOverall(){
  const tot=D.flatMap(s=>s.items).reduce((a,i)=>a+i.p.length,0);
  const dn=D.flatMap(s=>s.items).reduce((a,i)=>a+gD(i),0);
  const pct=tot>0?Math.round(dn/tot*100):0;
  document.getElementById('overall-text').textContent=`${dn} of ${tot} problems solved`;
  document.getElementById('overall-pct').textContent=pct+'%';
  document.getElementById('overall-bar').style.width=pct+'%';
}

function tog(tid, key, e){
  e.stopPropagation();
  DS[key]=!DS[key];
  save();
  showToast(DS[key]?'✓ Marked as solved':'Marked unsolved');
  renderSB(); renderMain(); updateOverall();
}

function selT(id){ aT=id; aF='all'; renderSB(); renderMain(); }

function renderSB(){
  const sb = document.getElementById('sb');
  const header = sb.querySelector('.sb-header');
  const overallBar = sb.querySelector('.overall-bar');
  sb.innerHTML = '';
  sb.appendChild(header);
  sb.appendChild(overallBar);

  D.forEach(sec=>{
    const tot=sec.items.reduce((a,i)=>a+i.p.length,0);
    const dn=sec.items.reduce((a,i)=>a+gD(i),0);
    const block=document.createElement('div');
    block.className='sec-block';
    block.innerHTML=`<div class="sec-row"><span class="sec-name">${sec.s}</span><span class="sec-stat">${dn}/${tot}</span></div>`;
    sec.items.forEach(i=>{
      const d=gD(i),total=i.p.length;
      const cls=d===total&&total>0?'full':d>0?'part':'none';
      const row=document.createElement('div');
      row.className='topic-row'+(aT===i.id?' active':'');
      row.innerHTML=`<span class="topic-hash">#</span><span class="topic-name">${i.n}</span><span class="topic-prog ${cls}">${d>0||aT===i.id?`${d}/${total}`:''}</span><span class="topic-total">${total}</span>`;
      row.onclick=()=>selT(i.id);
      block.appendChild(row);
    });
    sb.appendChild(block);
  });
}

function renderMain(){
  const main=document.getElementById('main');
  if(!aT){
    main.innerHTML=`<div class="empty"><div style="font-size:36px">📚</div><span style="font-size:16px;font-weight:500;color:var(--text2)">Select a topic</span><span style="font-size:13px">Choose from the left panel</span></div>`;
    return;
  }
  const topic=D.flatMap(s=>s.items).find(i=>i.id===aT);
  const dc=gD(topic);
  let probs=topic.p;
  if(aF==='done') probs=probs.filter(p=>DS[topic.id+'§'+p.t]);
  if(aF==='todo') probs=probs.filter(p=>!DS[topic.id+'§'+p.t]);

  const rows=probs.map(p=>{
    const k=topic.id+'§'+p.t;
    const isDone=DS[k];
    return `<tr class="pr${isDone?' slv':''}" onclick="window.open('${p.url}','_blank')">
      <td style="width:44px" onclick="event.stopPropagation()">
        <div class="cb${isDone?' dn':''}" onclick="tog('${topic.id}','${k.replace(/'/g,"\\'")}',event)">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1.5 5.5l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </td>
      <td>
        <span class="prob-num">${p.n}.</span>
        <span class="pname">${p.t}</span>
        <a class="link-pill ${p.isGfg?'link-gfg':'link-lc'}" href="${p.url}" target="_blank" onclick="event.stopPropagation()">${p.isGfg?'GFG ↗':'LC ↗'}</a>
        ${isDone?'<span class="sbadge">Solved</span>':''}
      </td>
      <td style="width:90px"><span class="${p.d==='e'?'de':p.d==='m'?'dm':'dh'}">${p.d==='e'?'Easy':p.d==='m'?'Medium':'Hard'}</span></td>
      <td style="width:150px"><span class="pat">${p.pat}</span></td>
    </tr>`;
  }).join('');

  main.innerHTML=`
    <div class="m-top">
      <div class="m-title">${topic.n}</div>
      <div class="m-sub">${topic.p.length} problems · ${dc} solved</div>
    </div>
    <div class="filter-row">
      <button class="fb${aF==='all'?' act':''}" onclick="aF='all';renderMain()">All (${topic.p.length})</button>
      <button class="fb${aF==='done'?' act':''}" onclick="aF='done';renderMain()">Solved (${dc})</button>
      <button class="fb${aF==='todo'?' act':''}" onclick="aF='todo';renderMain()">To Do (${topic.p.length-dc})</button>
    </div>
    <table>
      <thead><tr>
        <th style="width:44px">Done</th>
        <th>Problem</th>
        <th style="width:90px">Difficulty</th>
        <th style="width:150px">Pattern</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

renderSB();
renderMain();
updateOverall();
</script>
